apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: infera-gateway
    newName: ghcr.io/your-github-user/infera-gateway
    newTag: latest
  - name: infera-ingestion
    newName: ghcr.io/your-github-user/infera-ingestion
    newTag: latest
  - name: infera-web
    newName: ghcr.io/your-github-user/infera-web
    newTag: latest

patches:
  - path: configmap-patch.yaml
  - path: ingress-patch.yaml
