apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infera-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - infera.your-domain.example
      secretName: infera-web-tls
  rules:
    - host: infera.your-domain.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infera-web
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infera-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.infera.your-domain.example
      secretName: infera-api-tls
  rules:
    - host: api.infera.your-domain.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infera-gateway
                port:
                  name: http
