apiVersion: apps/v1
kind: Deployment
metadata:
  name: infera-ingestion
  labels:
    app.kubernetes.io/name: infera-ingestion
    app.kubernetes.io/part-of: infera
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infera-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infera-ingestion
        app.kubernetes.io/part-of: infera
    spec:
      containers:
        - name: ingestion
          image: infera-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: infera-config
            - secretRef:
                name: infera-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infera-worker
  labels:
    app.kubernetes.io/name: infera-worker
    app.kubernetes.io/part-of: infera
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infera-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infera-worker
        app.kubernetes.io/part-of: infera
    spec:
      containers:
        - name: worker
          image: infera-ingestion:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.consumer"]
          envFrom:
            - configMapRef:
                name: infera-config
            - secretRef:
                name: infera-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: infera-ingestion
  labels:
    app.kubernetes.io/name: infera-ingestion
    app.kubernetes.io/part-of: infera
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infera-ingestion
  ports:
    - name: http
      port: 8001
      targetPort: http
