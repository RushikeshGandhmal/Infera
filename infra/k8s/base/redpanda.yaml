apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: infera
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: schema
      port: 8081
      targetPort: schema
    - name: proxy
      port: 8082
      targetPort: proxy
    - name: admin
      port: 9644
      targetPort: admin
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: infera
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/part-of: infera
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          imagePullPolicy: IfNotPresent
          command:
            - redpanda
            - start
            - --kafka-addr=internal://0.0.0.0:9092
            - --advertise-kafka-addr=internal://redpanda:9092
            - --pandaproxy-addr=internal://0.0.0.0:8082
            - --advertise-pandaproxy-addr=internal://redpanda:8082
            - --schema-registry-addr=internal://0.0.0.0:8081
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=redpanda-0.redpanda.infera.svc.cluster.local:33145
            - --mode=dev-container
            - --smp=1
            - --default-log-level=info
          ports:
            - name: kafka
              containerPort: 9092
            - name: schema
              containerPort: 8081
            - name: proxy
              containerPort: 8082
            - name: admin
              containerPort: 9644
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - rpk cluster health | grep -E 'Healthy:.+true'
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - rpk cluster health | grep -E 'Healthy:.+true'
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-topics
  labels:
    app.kubernetes.io/name: redpanda-topics
    app.kubernetes.io/part-of: infera
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda-topics
        app.kubernetes.io/part-of: infera
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until rpk cluster health --brokers redpanda:9092; do
                sleep 5
              done
              rpk topic create inference.logs.raw --brokers redpanda:9092 -p 3 || true
              rpk topic create inference.logs.dlq --brokers redpanda:9092 -p 1 || true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
