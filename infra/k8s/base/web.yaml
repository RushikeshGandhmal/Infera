apiVersion: apps/v1
kind: Deployment
metadata:
  name: infera-web
  labels:
    app.kubernetes.io/name: infera-web
    app.kubernetes.io/part-of: infera
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infera-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infera-web
        app.kubernetes.io/part-of: infera
    spec:
      containers:
        - name: web
          image: infera-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: infera-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: infera-web
  labels:
    app.kubernetes.io/name: infera-web
    app.kubernetes.io/part-of: infera
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infera-web
  ports:
    - name: http
      port: 3000
      targetPort: http
