apiVersion: apps/v1
kind: Deployment
metadata:
  name: infera-gateway
  labels:
    app.kubernetes.io/name: infera-gateway
    app.kubernetes.io/part-of: infera
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infera-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infera-gateway
        app.kubernetes.io/part-of: infera
    spec:
      containers:
        - name: gateway
          image: infera-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: infera-config
            - secretRef:
                name: infera-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: infera-gateway
  labels:
    app.kubernetes.io/name: infera-gateway
    app.kubernetes.io/part-of: infera
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infera-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
